<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>Format plain text with Unicode</title>
		<meta name="viewport" content="width=device-width">
		<meta name="description" content="Format plain text in bold, italic and other nice ways using Unicode.">
		<meta name="keywords" content="
			bold, italic, monospace, double-struck, fraktur, mathematical, circled, fullwidth,
			parenthesized, bold script, script, squared, negative squared, unicode, rich text, format
		"/>
		<link href="https://fonts.googleapis.com/css?family=Open+Sans" rel="stylesheet">
		<link href="style.css" rel="stylesheet">
		<script type="text/javascript" src="unicodeformat.js"></script>
	</head>

	<body onload="init();">
		<h1>Format plain text with Unicode</h1>

		<div class="header">
			<span>
				<select id="variant"></select>
				<button type="button" id="zero-width-space-btn" title="Insert Zero-Width Space (Ctrl+Alt+Z)">Zero-Width Space</button>
			</span>
			<span style="flex-grow: 1;"></span>
			<a href="https://github.com/panzi/unicodeformat/">Info</a>
		</div>

		<div class="grow-wrap">
			<textarea id="text" placeholder="Type your message here…" autocomplete="off" autofocus></textarea>
		</div>

		<div class="foot">
			<form action="javascript:void(0)">
				<input type="url" id="intent-url" autocomplete="on" placeholder="https://mastodon.social/" title="Mastodon Instance URL" required />
				<button type="submit" id="intent-btn" title="Post on Mastodon (Ctrl+Enter)">Toot</button>
			</form>

			<button type="button" id="copy-btn" data-init="Copy" data-copied="Copied ✅" title="Copy whole text to clipboard (Ctrl+Alt+C)">Copy</button>
		</div>
	</body>
</html>
