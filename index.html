<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>Format plain text with Unicode</title>
		<meta name="viewport" content="width=device-width">
		<meta name="description" content="Format plain text in bold, italic and other nice ways using Unicode.">
		<meta name="keywords" content="
			bold, italic, monospace, double-struck, fraktur, mathematical, circled, fullwidth,
			parenthesized, bold script, script, squared, negative squared, unicode, rich text, format
		">
		<link href="https://fonts.googleapis.com/css?family=Open+Sans" rel="stylesheet">
		<link href="style.css" rel="stylesheet">
		<script type="text/javascript" src="unicodeformat.js?_=3" async></script>
	</head>

	<body>
		<h1>Unicode Formatting</h1>

		<header class="header">
			<input type="hidden" id="variant" value="ascii">
			<select id="family" aria-label="Font Family"></select>
			<input type="checkbox" id="bold" title="Bold" aria-label="Bold" class="toggle thin-btn" disabled>
			<input type="checkbox" id="italic" title="Italic" aria-label="Italic" class="toggle thin-btn" disabled>
			<button type="button" id="zero-width-space-btn" class="thin-btn" title="Insert Zero-Width Space (Ctrl+Alt+Z)" aria-label="Insert Zero-Width Space">›‹</button>
			<span style="flex-grow: 1;" aria-hidden="true"></span>
			<a rel="help noreferrer noopener" href="https://github.com/panzi/unicodeformat/#readme">Help</a>
		</header>

		<div class="grow-wrap">
			<textarea id="text" placeholder="Type your message here…" autocomplete="off" autofocus></textarea>
		</div>

		<form class="foot" action="javascript:void(0)">
			<input type="url" id="intent-url" autocomplete="on" placeholder="https://mastodon.social/" title="Mastodon Instance URL" required>
			<button type="submit" id="intent-btn" title="Post on Mastodon (Ctrl+Enter)&#xa;Simply navigates to &lt;Mastodon Instance URL&gt;/?text=&lt;Text&gt;">Toot</button>
			<button type="button" id="copy-btn" data-init="Copy" data-copied="Copied ✅" title="Copy whole text to clipboard (Ctrl+Alt+C)">Copy</button>
		</form>
	</body>
</html>
