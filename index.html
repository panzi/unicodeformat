<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8"/>
		<title>Format plain text with Unicode</title>
		<meta name="viewport" content="width=device-width" />
		<meta name="description" content="Format plain text in bold, italic and other nice ways using Unicode."/>
		<meta name="keywords" content="
			bold, italic, monospace, double-struck, fraktur, mathematical, circled, fullwidth,
			parenthesized, bold script, script, squared, negative squared, unicode, rich text, format
		"/>
		<link href="https://fonts.googleapis.com/css?family=Open+Sans" rel="stylesheet" />
		<style type="text/css">
			body {
				font-family: 'Open Sans', sans-serif;
				color: #707070;
				max-width: 800px;
				margin: auto;
				padding: 0 1em;
			}
			h1 {
				margin: 0.5em 0;
				font-size: 1.6em;
			}
			#text {
				width: 100%;
				min-height: 8em;
			}
			.header {
				white-space: nowrap;
				margin-bottom: 5px;
			}
			.foot {
				margin-top: 5px;
				text-align: right;
			}
			select {
				font-size: 1.1em;
				height: 1.8em;
			}

			/* Source: https://chriscoyier.net/2023/09/29/css-solves-auto-expanding-textareas-probably-eventually/ */
			.grow-wrap {
				/* easy way to plop the elements on top of each other and have them both sized based on the tallest one's height */
				display: grid;
			}
			.grow-wrap::after {
				/* Note the weird space! Needed to preventy jumpy behavior */
				content: attr(data-replicated-value) " ";

				/* This is how textarea text behaves */
				white-space: pre-wrap;

				/* Hidden from view, clicks, and screen readers */
				visibility: hidden;
			}
			.grow-wrap > textarea {
				/* You could leave this, but after a user resizes, then it ruins the auto sizing */
				resize: none;

				/* Firefox shows scrollbar on growth, you can hide like this. */
				overflow: hidden;
			}
			.grow-wrap > textarea,
			.grow-wrap::after {
				/* Identical styling required!! */
				border: 1px solid #c5c5c5;
				border-radius: 4px;
				padding: 0.5rem;
				font: inherit;
				box-sizing: border-box;

				/* Place on top of each other */
				grid-area: 1 / 1 / 2 / 2;
			}

			select {
				max-width: 100%;
				border-radius: 4px;
				background: #f0f0f0;
				background-image: linear-gradient(rgba(0,0,0,0),rgba(0,0,0,0.05));
				border: 1px solid #c5c5c5;
				box-shadow: inset 0 1px 0 rgba(255,255,255,0.15);
				color: #303030;
			}
			select:hover {
				background: white;
				background-image: linear-gradient(rgba(0,0,0,0),rgba(0,0,0,0.15));
			}
			button {
				display: inline-block;
				font-size: 14px;
				font-weight: bold;
				padding: 8px 16px;
				cursor: pointer;
				border-radius: 4px;
			}
			#copy-btn {
				color: #ffffff;
				background-color: #2f2f2f;
				background-image: linear-gradient(rgba(0,0,0,0),rgba(0,0,0,0.05));
				border: 1px solid #3f3f3f;
				box-shadow: inset 0 1px 0 rgba(255,255,255,0.15);
			}
			#copy-btn:hover {
				background-color: #525252;
				background-image: linear-gradient(rgba(0,0,0,0),rgba(0,0,0,0.15));
			}
		</style>
		<script type="text/javascript" src="unicodeformat.js"></script>
	</head>

	<body onload="init();">
		<h1>Format plain text with Unicode</h1>

		<div class="header"><select id="variant"></select></div>

		<div class="grow-wrap">
			<textarea id="text" placeholder="Type your message here…" autocomplete="off" autofocus></textarea>
		</div>

		<div class="foot">
			<button type="button" id="copy-btn" data-init="Copy" data-copied="Copied ✅">Copy</button>
		</div>
	</body>
</html>
